<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cronograma de Obra – Gantt</title>
<style>
:root {
  --bg-base: #0a0a0f;
  --bg-surface: #12121a;
  --bg-card: #1a1a26;
  --bg-hover: #22223a;
  --border: #2a2a40;
  --border-light: #1e1e30;
  --text-primary: #e8e8f0;
  --text-secondary: #8888aa;
  --text-muted: #55556a;
  --accent-blue: #4f8ef7;
  --accent-blue-dim: #1a2a4a;
  --accent-green: #3ecf8e;
  --accent-amber: #f59e0b;
  --accent-red: #f75f5f;
  --accent-red-dim: #2a1a1a;
  --glow-blue: rgba(79,142,247,0.25);
  --glow-green: rgba(62,207,142,0.2);
  --glow-red: rgba(247,95,95,0.25);
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0}

body {
  background: var(--bg-base);
  color: var(--text-primary);
  font-family: var(--font);
  min-height: 100vh;
  padding: 0;
}

body::before {
  content:'';
  position:fixed;
  inset:0;
  background: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(79,142,247,0.06) 0%, transparent 70%);
  pointer-events:none;
  z-index:0;
}

.w {
  position: relative;
  z-index: 1;
  padding: 1.5rem 1.75rem;
  max-width: 1600px;
  margin: 0 auto;
}

/* ── TOPBAR ── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.25rem;
  flex-wrap: wrap;
  gap: 12px;
}

.title h1 {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: -.02em;
}

.title p {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 3px;
}

.controls {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}

/* ── TOGGLE GROUP ── */
.tg {
  display: flex;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  padding: 3px;
  gap: 2px;
}

.tg button {
  font-size: 12px;
  font-weight: 500;
  padding: 5px 14px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  color: var(--text-secondary);
  background: transparent;
  font-family: var(--font);
  transition: all 0.2s ease;
}

.tg button:hover:not(.on) {
  color: var(--text-primary);
  background: var(--bg-hover);
}

.tg button.on {
  background: var(--accent-blue);
  color: #fff;
  box-shadow: 0 0 12px var(--glow-blue), 0 2px 6px rgba(0,0,0,0.4);
  font-weight: 600;
}

/* ── SHEETS BUTTON ── */
.sheets-btn {
  font-size: 12px;
  font-weight: 500;
  padding: 7px 16px;
  border-radius: 8px;
  border: 1px solid var(--border);
  cursor: pointer;
  background: var(--bg-card);
  color: var(--text-primary);
  font-family: var(--font);
  display: flex;
  align-items: center;
  gap: 7px;
  transition: all 0.2s ease;
  position: relative;
  overflow: hidden;
}
.sheets-btn:hover {
  border-color: var(--accent-green);
  color: var(--accent-green);
  box-shadow: 0 0 16px var(--glow-green), 0 2px 8px rgba(0,0,0,0.4);
  transform: translateY(-1px);
}
.sheets-btn:active { transform: translateY(0); }
.sheets-btn.loading { opacity:.5; cursor:wait; transform:none; }
.sheets-btn.synced {
  border-color: var(--accent-green);
  color: var(--accent-green);
  box-shadow: 0 0 10px var(--glow-green);
}

/* ── SHEETS CONFIG MODAL ── */
.cfg-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
}
.cfg-modal {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 1.75rem;
  width: 420px;
  max-width: 95%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(62,207,142,0.1);
  animation: modalIn .18s ease;
}
.cfg-modal h3 {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: .25rem;
}
.cfg-modal p.sub {
  font-size: 11px;
  color: var(--text-secondary);
  margin-bottom: 1.25rem;
  line-height: 1.6;
}
.cfg-modal .cfg-field { margin-bottom: 1rem; }
.cfg-modal .cfg-field label {
  display: block;
  font-size: 11px;
  color: var(--text-secondary);
  margin-bottom: 5px;
  font-weight: 500;
}
.cfg-modal .cfg-field input {
  width: 100%;
  font-size: 12px;
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg-surface);
  color: var(--text-primary);
  font-family: var(--font);
  transition: border-color 0.2s, box-shadow 0.2s;
}
.cfg-modal .cfg-field input:focus {
  outline: none;
  border-color: var(--accent-green);
  box-shadow: 0 0 0 3px rgba(62,207,142,0.12);
}
.cfg-modal .cfg-field input::placeholder { color: var(--text-muted); }
.sync-status {
  font-size: 11px;
  padding: 7px 12px;
  border-radius: 7px;
  margin-bottom: 1rem;
  display: none;
}
.sync-status.ok  { background: rgba(62,207,142,0.1); color: var(--accent-green); border: 1px solid rgba(62,207,142,0.2); display:block; }
.sync-status.err { background: var(--accent-red-dim); color: var(--accent-red); border: 1px solid rgba(247,95,95,0.2); display:block; }
.sync-status.inf { background: var(--accent-blue-dim); color: var(--accent-blue); border: 1px solid rgba(79,142,247,0.2); display:block; }

/* ── PDF BUTTON ── */
.pdf-btn {
  font-size: 12px;
  font-weight: 500;
  padding: 7px 16px;
  border-radius: 8px;
  border: 1px solid var(--border);
  cursor: pointer;
  background: var(--bg-card);
  color: var(--text-primary);
  font-family: var(--font);
  display: flex;
  align-items: center;
  gap: 7px;
  transition: all 0.2s ease;
  position: relative;
  overflow: hidden;
}

.pdf-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(79,142,247,0.08) 0%, transparent 60%);
  opacity: 0;
  transition: opacity 0.2s;
}

.pdf-btn:hover {
  border-color: var(--accent-blue);
  color: var(--accent-blue);
  box-shadow: 0 0 16px var(--glow-blue), 0 2px 8px rgba(0,0,0,0.4);
  transform: translateY(-1px);
}

.pdf-btn:hover::before { opacity: 1; }
.pdf-btn:active { transform: translateY(0); }

.pdf-btn.loading {
  opacity: .5;
  cursor: wait;
  transform: none;
}

/* ── STAT CARDS ── */
.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 1.25rem;
}

.sc {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  transition: all 0.2s ease;
  position: relative;
  overflow: hidden;
}

.sc::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(79,142,247,0.4), transparent);
  opacity: 0;
  transition: opacity 0.2s;
}

.sc:hover { border-color: rgba(79,142,247,0.4); transform: translateY(-1px); }
.sc:hover::after { opacity: 1; }

.sl { font-size: 10px; color: var(--text-secondary); letter-spacing: .06em; text-transform: uppercase; }
.sv { font-size: 22px; font-weight: 700; color: var(--text-primary); margin-top: 4px; letter-spacing: -.02em; }
.ss { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

/* ── TABS ── */
.tabs {
  display: flex;
  gap: 4px;
  border-bottom: 1px solid var(--border-light);
  padding-bottom: 10px;
  margin-bottom: 1.25rem;
}

.tb {
  font-size: 13px;
  font-weight: 500;
  padding: 6px 16px;
  border-radius: 8px;
  border: 1px solid transparent;
  cursor: pointer;
  background: transparent;
  font-family: var(--font);
  color: var(--text-secondary);
  transition: all 0.2s ease;
}

.tb:hover:not(.on) {
  color: var(--text-primary);
  background: var(--bg-card);
  border-color: var(--border);
}

.tb.on {
  background: var(--bg-card);
  border-color: var(--accent-blue);
  color: var(--accent-blue);
  box-shadow: 0 0 10px var(--glow-blue);
}

/* ── TABLE ── */
.go { overflow-x: auto; }
.go::-webkit-scrollbar { height: 5px; }
.go::-webkit-scrollbar-track { background: var(--bg-base); }
.go::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

table { border-collapse: collapse; width: 100%; font-size: 12px; }

thead th {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-secondary);
  padding: 4px 6px;
  text-align: center;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  background: var(--bg-surface);
  letter-spacing: .04em;
  text-transform: uppercase;
}

thead th.lft { text-align: left; }

.ph td {
  background: rgba(79,142,247,0.05);
  font-weight: 600;
  font-size: 10px;
  color: var(--text-secondary);
  padding: 5px 8px;
  border-top: 1px solid var(--border);
  letter-spacing: .06em;
  text-transform: uppercase;
}

.tr td {
  padding: 4px 6px;
  border-bottom: 1px solid var(--border-light);
  vertical-align: middle;
}

.tr:hover td { background: rgba(79,142,247,0.04); }

.tn { font-size: 12px; color: var(--text-primary); white-space: nowrap; }
.tn.ms { color: var(--accent-amber); font-weight: 600; }
.rp { font-size: 11px; color: var(--text-secondary); white-space: nowrap; }
.dc { text-align: center; color: var(--text-secondary); }
.pw { min-width: 70px; }

.pb { background: var(--border); border-radius: 3px; height: 5px; width: 100%; }
.pf { height: 5px; border-radius: 3px; transition: width 0.4s ease; }
.pl { font-size: 10px; color: var(--text-secondary); text-align: right; margin-top: 2px; }

.gc { width: 14px; min-width: 13px; height: 26px; text-align: center; padding: 0; }
.bd { height: 11px; margin: 7px 1px; border-radius: 2px; }
.mdot { width: 9px; height: 9px; transform: rotate(45deg); margin: 8px auto; border-radius: 1px; background: var(--accent-amber); box-shadow: 0 0 6px rgba(245,158,11,0.5); }
.wk { background: rgba(255,255,255,0.015); }

/* ── EDIT BUTTON ── */
.ed-btn {
  font-size: 10px;
  padding: 3px 9px;
  border-radius: 5px;
  border: 1px solid var(--border);
  cursor: pointer;
  background: var(--bg-card);
  color: var(--text-secondary);
  font-family: var(--font);
  white-space: nowrap;
  transition: all 0.2s ease;
}

.ed-btn:hover {
  background: var(--accent-blue-dim);
  border-color: var(--accent-blue);
  color: var(--accent-blue);
  box-shadow: 0 0 8px var(--glow-blue);
}

/* ── DELETE BUTTON ── */
.del-btn {
  font-size: 11px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 5px;
  border: 1px solid transparent;
  cursor: pointer;
  background: transparent;
  color: var(--text-muted);
  font-family: var(--font);
  white-space: nowrap;
  transition: all 0.2s ease;
  line-height: 1;
}

.del-btn:hover {
  background: var(--accent-red-dim);
  border-color: var(--accent-red);
  color: var(--accent-red);
  box-shadow: 0 0 8px var(--glow-red);
}

/* ── ADD TASK ROW ── */
.tr-add td {
  padding: 4px 8px;
  border-bottom: 1px solid var(--border-light);
}

.add-task-row-btn {
  font-size: 11px;
  font-weight: 600;
  padding: 4px 12px;
  border-radius: 6px;
  border: 1px dashed rgba(79,142,247,0.35);
  cursor: pointer;
  background: rgba(79,142,247,0.03);
  color: rgba(79,142,247,0.7);
  font-family: var(--font);
  transition: all 0.2s ease;
}

.add-task-row-btn:hover {
  background: var(--accent-blue-dim);
  border-color: var(--accent-blue);
  color: var(--accent-blue);
  box-shadow: 0 0 10px var(--glow-blue);
}

/* ── ADD PHASE ROW ── */
.tr-add-ph td {
  padding: 6px 8px;
  border-top: 1px solid var(--border);
}

.add-ph-row-btn {
  font-size: 11px;
  font-weight: 600;
  padding: 5px 14px;
  border-radius: 6px;
  border: 1px dashed rgba(62,207,142,0.35);
  cursor: pointer;
  background: rgba(62,207,142,0.03);
  color: rgba(62,207,142,0.7);
  font-family: var(--font);
  transition: all 0.2s ease;
}

.add-ph-row-btn:hover {
  background: rgba(62,207,142,0.1);
  border-color: var(--accent-green);
  color: var(--accent-green);
  box-shadow: 0 0 10px var(--glow-green);
}

/* ── MONTH CONTROLS ── */
.month-ctrl-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 14px;
  margin-bottom: 10px;
  flex-wrap: wrap;
  gap: 10px;
}

.month-ctrl-bar .mrange {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: .02em;
}

.month-ctrl-bar .mctrl-grp {
  display: flex;
  gap: 6px;
  align-items: center;
}

.mctrl-btn {
  font-size: 11px;
  font-weight: 500;
  padding: 4px 11px;
  border-radius: 6px;
  border: 1px solid var(--border);
  cursor: pointer;
  background: var(--bg-surface);
  color: var(--text-secondary);
  font-family: var(--font);
  transition: all 0.2s ease;
  white-space: nowrap;
}

.mctrl-btn:hover {
  background: var(--accent-blue-dim);
  border-color: var(--accent-blue);
  color: var(--accent-blue);
  box-shadow: 0 0 8px var(--glow-blue);
}

.mctrl-btn.danger:hover {
  background: var(--accent-red-dim);
  border-color: var(--accent-red);
  color: var(--accent-red);
  box-shadow: 0 0 8px var(--glow-red);
}

/* ── PHASE HEADER ACTIONS ── */
.ph-actions {
  float: right;
  display: flex;
  gap: 5px;
  align-items: center;
  margin-top: -1px;
}

.ph-del-btn {
  font-size: 11px;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 4px;
  border: 1px solid transparent;
  cursor: pointer;
  background: transparent;
  color: var(--text-muted);
  font-family: var(--font);
  transition: all 0.2s ease;
  line-height: 1.4;
}

.ph-del-btn:hover {
  background: var(--accent-red-dim);
  border-color: var(--accent-red);
  color: var(--accent-red);
}

/* ── MODAL ── */
.modal-bg {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
}

.modal {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 1.5rem;
  width: 330px;
  max-width: 95%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(79,142,247,0.1);
  animation: modalIn .18s ease;
}

@keyframes modalIn {
  from { opacity:0; transform: scale(.96) translateY(8px); }
  to   { opacity:1; transform: scale(1)  translateY(0);    }
}

.modal h3 {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 1rem;
  padding-bottom: .75rem;
  border-bottom: 1px solid var(--border);
}

.mfield { margin-bottom: .875rem; }

.mfield label {
  display: block;
  font-size: 11px;
  color: var(--text-secondary);
  margin-bottom: 5px;
  font-weight: 500;
  letter-spacing: .02em;
}

.mfield input[type=date],
.mfield input[type=number],
.mfield input[type=text],
.mfield select,
.mfield input[type=color] {
  width: 100%;
  font-size: 13px;
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg-surface);
  color: var(--text-primary);
  font-family: var(--font);
  transition: border-color 0.2s, box-shadow 0.2s;
  color-scheme: dark;
}

.mfield input[type=color] {
  height: 38px;
  padding: 4px 6px;
  cursor: pointer;
}

.mfield select {
  cursor: pointer;
}

.mfield select option {
  background: var(--bg-card);
}

.mfield input:focus,
.mfield select:focus {
  outline: none;
  border-color: var(--accent-blue);
  box-shadow: 0 0 0 3px rgba(79,142,247,0.15);
}

.mfield .row2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.pslider {
  width: 100%;
  appearance: none;
  height: 5px;
  border-radius: 3px;
  background: var(--border);
  outline: none;
  cursor: pointer;
}

.pslider::-webkit-slider-thumb {
  appearance: none;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--accent-blue);
  box-shadow: 0 0 8px var(--glow-blue);
  cursor: pointer;
  transition: transform 0.1s;
}

.pslider::-webkit-slider-thumb:hover { transform: scale(1.2); }

.mbrow {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 1.25rem;
  padding-top: .875rem;
  border-top: 1px solid var(--border);
}

.mbrow button {
  font-size: 12px;
  font-weight: 500;
  padding: 7px 16px;
  border-radius: 7px;
  border: 1px solid var(--border);
  cursor: pointer;
  background: var(--bg-surface);
  color: var(--text-primary);
  font-family: var(--font);
  transition: all 0.2s ease;
}

.mbrow button:hover {
  background: var(--bg-hover);
  border-color: var(--text-muted);
}

.mbrow button.pri {
  background: var(--accent-blue);
  border-color: var(--accent-blue);
  color: #fff;
  box-shadow: 0 0 12px var(--glow-blue);
}

.mbrow button.pri:hover {
  background: #6aa0ff;
  box-shadow: 0 0 20px var(--glow-blue);
  transform: translateY(-1px);
}

/* ── LEGEND ── */
.legend {
  display: flex;
  gap: 18px;
  margin-top: 14px;
  flex-wrap: wrap;
  padding: 10px 0;
  border-top: 1px solid var(--border-light);
}

.li { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-secondary); }
.lbox { width: 14px; height: 8px; border-radius: 2px; display: inline-block; }

/* ── PENDING CARDS ── */
.pc-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  cursor: pointer;
  transition: all 0.2s ease;
}

.pc-card:hover {
  border-color: rgba(79,142,247,0.4);
  background: var(--bg-hover);
  transform: translateX(3px);
  box-shadow: 0 0 12px rgba(79,142,247,0.08);
}

.pdone-card { opacity: .55; }
.pdone-card:hover { opacity: .75; }

.pbadge {
  font-size: 10px;
  font-weight: 600;
  color: var(--accent-blue);
  background: var(--accent-blue-dim);
  border: 1px solid rgba(79,142,247,0.25);
  padding: 3px 9px;
  border-radius: 5px;
  white-space: nowrap;
  flex-shrink: 0;
  min-width: 120px;
  text-align: center;
  letter-spacing: .02em;
}

.pdesc { font-size: 12px; color: var(--text-primary); line-height: 1.5; flex: 1; }
.pdone-card .pdesc { text-decoration: line-through; color: var(--text-muted); }

.pstat {
  font-size: 10px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 5px;
  flex-shrink: 0;
  letter-spacing: .03em;
}

.pstat.open {
  background: var(--accent-blue-dim);
  color: var(--accent-blue);
  border: 1px solid rgba(79,142,247,0.2);
}

.pstat.done {
  background: rgba(62,207,142,0.1);
  color: var(--accent-green);
  border: 1px solid rgba(62,207,142,0.2);
}

.pdel-btn {
  font-size: 12px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 5px;
  border: 1px solid transparent;
  cursor: pointer;
  background: transparent;
  color: var(--text-muted);
  font-family: var(--font);
  flex-shrink: 0;
  transition: all 0.2s ease;
  line-height: 1.4;
}

// Dynamic months: {y: year, m: month 0-indexed}
let MONTHS=[{y:2025,m:3},{y:2025,m:4},{y:2025,m:5},{y:2025,m:6},{y:2025,m:7},{y:2025,m:8}];

let curV='w', curT='g', editId=null;
let nextPendingId=20, nextTaskId=20, nextPhaseId=6;

/* ── HELPERS ── */
function pd(s){const[y,m,d]=s.split('-');return new Date(+y,+m-1,+d)}
function diff(a,b){return Math.round((b-a)/86400000)}
function mname(n){return['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][n]}
function phColor(phid){const ph=PHASES.find(p=>p.id===phid);return ph?ph.col:'#4f8ef7'}

function buildDays(){
  const first=MONTHS[0],last=MONTHS[MONTHS.length-1];
  const days=[],d=new Date(first.y,first.m,1),end=new Date(last.y,last.m+1,0);
  while(d<=end){days.push(new Date(d));d.setDate(d.getDate()+1)}
  return days;
}

function dateRangeLabel(){
  const first=MONTHS[0],last=MONTHS[MONTHS.length-1];
  const sy=first.y,ey=last.y;
  if(sy===ey) return `${mname(first.m)} ${sy} → ${mname(last.m)} ${ey}`;
  return `${mname(first.m)} ${sy} → ${mname(last.m)} ${ey}`;
}

/* ── MONTH CONTROLS ── */
function addMonthEnd(){
  const last=MONTHS[MONTHS.length-1];
  let nm=last.m+1,ny=last.y;
  if(nm>11){nm=0;ny++}
  MONTHS.push({y:ny,m:nm});
  renderGantt();updateDateRange();
}
function removeMonthEnd(){
  if(MONTHS.length<=1)return;
  MONTHS.pop();
  renderGantt();updateDateRange();
}
function addMonthStart(){
  const first=MONTHS[0];
  let nm=first.m-1,ny=first.y;
  if(nm<0){nm=11;ny--}
  MONTHS.unshift({y:ny,m:nm});
  renderGantt();updateDateRange();
}
function removeMonthStart(){
  if(MONTHS.length<=1)return;
  MONTHS.shift();
  renderGantt();updateDateRange();
}
function updateDateRange(){
  document.getElementById('daterange').textContent=dateRangeLabel()+' — editable';
}

/* ── TASK CRUD ── */
function deleteTask(id){
  if(!confirm('¿Eliminar esta tarea?'))return;
  TASKS=TASKS.filter(t=>t.id!==id);
  renderAll();
}

function openAddTask(phId){
  const overlay=document.createElement('div');
  overlay.className='modal-bg';overlay.id='addtmodal';
  const firstMo=MONTHS[0],lastMo=MONTHS[MONTHS.length-1];
  const defaultDate=`${firstMo.y}-${String(firstMo.m+1).padStart(2,'0')}-01`;
  const phOptions=PHASES.map(p=>`<option value="${p.id}"${p.id===phId?' selected':''}>${p.name}</option>`).join('');
  overlay.innerHTML=`<div class="modal"><h3>Agregar tarea</h3>
    <div class="mfield"><label>Fase</label><select id="at_ph">${phOptions}</select></div>
    <div class="mfield"><label>Nombre de la tarea</label><input type="text" id="at_n" placeholder="Nombre de la tarea"></div>
    <div class="mfield"><label>Responsable</label><input type="text" id="at_r" placeholder="Responsable"></div>
    <div class="mfield"><div class="row2">
      <div><label>Fecha inicio</label><input type="date" id="at_s" value="${defaultDate}"></div>
      <div><label>Fecha fin</label><input type="date" id="at_e" value="${defaultDate}"></div>
    </div></div>
    <div class="mfield"><label>Avance: <span id="at_pshow" style="color:#4f8ef7;font-weight:700">0%</span></label>
      <input type="range" class="pslider" id="at_p" min="0" max="100" step="5" value="0" oninput="document.getElementById('at_pshow').textContent=this.value+'%'"></div>
    <div class="mfield" style="display:flex;align-items:center;gap:8px">
      <input type="checkbox" id="at_ms" style="width:16px;height:16px;cursor:pointer;accent-color:#f59e0b">
      <label for="at_ms" style="margin:0;cursor:pointer">Es un hito (milestone)</label>
    </div>
    <div class="mbrow">
      <button onclick="closeModal('addtmodal')">Cancelar</button>
      <button class="pri" onclick="saveAddTask()">Agregar</button>
    </div>
  </div>`;
  overlay.addEventListener('click',e=>{if(e.target===overlay)closeModal('addtmodal')});
  document.getElementById('root').style.position='relative';
  document.getElementById('root').appendChild(overlay);
  setTimeout(()=>document.getElementById('at_n').focus(),50);
}

function saveAddTask(){
  const n=document.getElementById('at_n').value.trim();
  const r=document.getElementById('at_r').value.trim();
  const s=document.getElementById('at_s').value;
  const e=document.getElementById('at_e').value;
  const ph=document.getElementById('at_ph').value;
  const p=parseInt(document.getElementById('at_p').value);
  const ms=document.getElementById('at_ms').checked;
  if(!n||!s||!e)return;
  const ds=pd(s),de=pd(e);
  const d=Math.max(0,diff(ds,de));
  TASKS.push({id:nextTaskId++,ph,n,r:r||'—',s,e,d,p:ms?null:p,ms:ms||undefined});
  closeModal('addtmodal');
  renderAll();
}

/* ── PHASE CRUD ── */
function deletePhase(phId){
  const hasTasks=TASKS.some(t=>t.ph===phId);
  const msg=hasTasks
    ?'Esta fase tiene tareas. ¿Eliminar la fase y todas sus tareas?'
    :'¿Eliminar esta fase?';
  if(!confirm(msg))return;
  TASKS=TASKS.filter(t=>t.ph!==phId);
  PHASES=PHASES.filter(p=>p.id!==phId);
  renderAll();
}

function openAddPhase(){
  const overlay=document.createElement('div');
  overlay.className='modal-bg';overlay.id='addphmodal';
  overlay.innerHTML=`<div class="modal"><h3>Agregar fase</h3>
    <div class="mfield"><label>Nombre de la fase</label><input type="text" id="aph_n" placeholder="Ej: Fase 6 – Exterior"></div>
    <div class="mfield"><label>Color</label><input type="color" id="aph_c" value="#4f8ef7"></div>
    <div class="mbrow">
      <button onclick="closeModal('addphmodal')">Cancelar</button>
      <button class="pri" onclick="saveAddPhase()">Agregar</button>
    </div>
  </div>`;
  overlay.addEventListener('click',e=>{if(e.target===overlay)closeModal('addphmodal')});
  document.getElementById('root').style.position='relative';
  document.getElementById('root').appendChild(overlay);
  setTimeout(()=>document.getElementById('aph_n').focus(),50);
}

function saveAddPhase(){
  const n=document.getElementById('aph_n').value.trim();
  const col=document.getElementById('aph_c').value;
  if(!n)return;
  const id='p'+nextPhaseId++;
  PHASES.push({id,name:n,col});
  closeModal('addphmodal');
  renderAll();
}

/* ── MODAL HELPERS ── */
function closeModal(id){
  const m=document.getElementById(id);
  if(m)m.remove();
  document.getElementById('root').style.position='';
}

/* ── EXISTING EDIT TASK ── */
function openEdit(id){
  editId=id;
  const t=TASKS.find(x=>x.id===id);
  const overlay=document.createElement('div');
  overlay.className='modal-bg';overlay.id='editmodal';
  overlay.innerHTML=`<div class="modal"><h3>${t.n}</h3>
    <div class="mfield"><label>Nombre</label><input type="text" id="en" value="${t.n}"></div>
    <div class="mfield"><label>Responsable</label><input type="text" id="er" value="${t.r}"></div>
    <div class="mfield"><div class="row2">
      <div><label>Fecha inicio</label><input type="date" id="ei" value="${t.s}"></div>
      <div><label>Fecha fin</label><input type="date" id="ef" value="${t.e}"></div>
    </div></div>
    <div class="mfield"><label>Avance: <span id="pshow" style="color:#4f8ef7;font-weight:700">${t.p??0}%</span></label>
      <input type="range" class="pslider" id="ep" min="0" max="100" step="5" value="${t.p??0}" oninput="document.getElementById('pshow').textContent=this.value+'%'"></div>
    <div class="mbrow">
      <button onclick="closeModal('editmodal')">Cancelar</button>
      <button class="pri" onclick="saveEdit()">Guardar</button>
    </div>
  </div>`;
  overlay.addEventListener('click',e=>{if(e.target===overlay)closeModal('editmodal')});
  document.getElementById('root').style.position='relative';
  document.getElementById('root').appendChild(overlay);
}

function saveEdit(){
  const t=TASKS.find(x=>x.id===editId);
  const ns=document.getElementById('ei').value,ne=document.getElementById('ef').value;
  t.n=document.getElementById('en').value||t.n;
  t.s=ns;t.e=ne;t.d=diff(pd(ns),pd(ne));
  t.p=t.ms?null:parseInt(document.getElementById('ep').value);
  t.r=document.getElementById('er').value;
  closeModal('editmodal');renderAll();
}

/* ── PENDING CRUD ── */
function openAddPending(){
  const overlay=document.createElement('div');
  overlay.className='modal-bg';overlay.id='addpmodal';
  overlay.innerHTML=`<div class="modal"><h3>Nueva tarea pendiente</h3>
    <div class="mfield"><label>Proyecto</label><input type="text" id="np" placeholder="Ej: TANTI"></div>
    <div class="mfield"><label>Descripción</label><input type="text" id="nd" placeholder="Descripción de la tarea"></div>
    <div class="mbrow">
      <button onclick="closeModal('addpmodal')">Cancelar</button>
      <button class="pri" onclick="saveAddPending()">Agregar</button>
    </div>
  </div>`;
  overlay.addEventListener('click',e=>{if(e.target===overlay)closeModal('addpmodal')});
  document.getElementById('root').style.position='relative';
  document.getElementById('root').appendChild(overlay);
  setTimeout(()=>document.getElementById('np').focus(),50);
}

function saveAddPending(){
  const proj=document.getElementById('np').value.trim();
  const desc=document.getElementById('nd').value.trim();
  if(!proj||!desc)return;
  PENDING.push({id:nextPendingId++,proj,desc,done:false});
  closeModal('addpmodal');renderAll();
}

function deletePending(id,e){
  e.stopPropagation();
  if(!confirm('¿Eliminar esta tarea pendiente?'))return;
  PENDING=PENDING.filter(p=>p.id!==id);
  renderAll();
}

function togglePending(id){PENDING.find(p=>p.id===id).done^=true;renderAll()}

/* ── RENDER STATS ── */
function renderStats(){
  const rt=TASKS.filter(t=>!t.ms);
  const done=rt.filter(t=>t.p===100).length;
  const inp=rt.filter(t=>t.p>0&&t.p<100).length;
  const avg=rt.length?Math.round(rt.reduce((a,t)=>a+(t.p||0),0)/rt.length):0;
  const pend=PENDING.filter(p=>!p.done).length;
  document.getElementById('stats').innerHTML=`
    <div class="sc"><div class="sl">Avance general</div><div class="sv">${avg}%</div><div class="ss">del proyecto</div></div>
    <div class="sc"><div class="sl">Completadas</div><div class="sv">${done}</div><div class="ss">de ${rt.length} tareas</div></div>
    <div class="sc"><div class="sl">En progreso</div><div class="sv">${inp}</div><div class="ss">tareas activas</div></div>
    <div class="sc"><div class="sl">Pendientes</div><div class="sv">${pend}</div><div class="ss">de ${PENDING.length} items</div></div>`;
}

/* ── RENDER MONTH CONTROLS ── */
function renderMonthControls(){
  const first=MONTHS[0],last=MONTHS[MONTHS.length-1];
  const range=`${mname(first.m)} ${first.y} &rarr; ${mname(last.m)} ${last.y}`;
  return `<div class="month-ctrl-bar">
    <div class="mctrl-grp">
      <button class="mctrl-btn" onclick="addMonthStart()" title="Agregar mes al inicio">← + Mes</button>
      <button class="mctrl-btn danger" onclick="removeMonthStart()" title="Quitar mes del inicio">← − Mes</button>
    </div>
    <span class="mrange">📅 ${range}</span>
    <div class="mctrl-grp">
      <button class="mctrl-btn" onclick="addMonthEnd()" title="Agregar mes al final">+ Mes →</button>
      <button class="mctrl-btn danger" onclick="removeMonthEnd()" title="Quitar mes del final">− Mes →</button>
    </div>
  </div>`;
}

/* ── RENDER WEEKS ── */
function renderWeeks(){
  const days=buildDays();
  const mspans=[];
  days.forEach((d,i)=>{
    const key=d.getFullYear()*100+d.getMonth();
    if(i===0||key!==(days[i-1].getFullYear()*100+days[i-1].getMonth()))
      mspans.push({m:d.getMonth(),y:d.getFullYear(),cnt:0});
    mspans[mspans.length-1].cnt++;
  });
  const multiYear=new Set(MONTHS.map(m=>m.y)).size>1;
  const COLS=5;
  let h='<div class="go"><table><thead><tr>';
  h+=`<th class="lft" style="min-width:145px">Tarea</th><th class="lft" style="min-width:85px">Responsable</th><th style="min-width:32px">Días</th><th style="min-width:68px">Avance</th><th style="min-width:80px"></th>`;
  mspans.forEach(ms=>h+=`<th colspan="${ms.cnt}" style="font-size:10px;padding:2px 0;letter-spacing:.04em">${mname(ms.m)}${multiYear?' '+ms.y:''}</th>`);
  h+='</tr><tr><th></th><th></th><th></th><th></th><th></th>';
  days.forEach(d=>{
    const we=d.getDay()===0||d.getDay()===6;
    h+=`<th class="gc${we?' wk':''}" style="font-size:9px;padding:1px">${d.getDate()}</th>`;
  });
  h+='</tr></thead><tbody>';

  // Group tasks by phase order
  PHASES.forEach(ph=>{
    const phtasks=TASKS.filter(t=>t.ph===ph.id);
    h+=`<tr class="ph"><td colspan="${COLS+days.length}"><span>${ph.name}</span><span class="ph-actions"><button class="ph-del-btn" onclick="deletePhase('${ph.id}')">✕ Eliminar fase</button></span></td></tr>`;
    phtasks.forEach(t=>{
      const ts=pd(t.s),te=pd(t.e),col=phColor(t.ph);
      const pb=t.p===null?'':`<div class="pb"><div class="pf" style="width:${t.p}%;background:${col}"></div></div><div class="pl">${t.p}%</div>`;
      const actions=t.ms?'':`<button class="ed-btn" onclick="openEdit(${t.id})">Editar</button> <button class="del-btn" onclick="deleteTask(${t.id})">✕</button>`;
      h+=`<tr class="tr"><td><div class="tn${t.ms?' ms':''}">${t.ms?'◆ ':''} ${t.n}</div></td><td><div class="rp">${t.r}</div></td><td class="dc">${t.d||'—'}</td><td class="pw">${pb}</td><td style="white-space:nowrap">${actions}</td>`;
      days.forEach(d=>{
        const we=d.getDay()===0||d.getDay()===6;
        const inr=d>=ts&&d<=te;
        let cell='';
        if(t.ms&&d.toDateString()===ts.toDateString()){cell='<div class="mdot"></div>'}
        else if(!t.ms&&inr){
          if(t.p===100) cell=`<div class="bd" style="background:#3ecf8e;box-shadow:0 0 4px rgba(62,207,142,0.3)"></div>`;
          else if(t.p===0) cell=`<div class="bd" style="background:#1e2a40"></div>`;
          else cell=`<div style="position:relative;height:11px;margin:7px 1px;border-radius:2px;overflow:hidden"><div style="position:absolute;inset:0;background:#1e2a40;border-radius:2px"></div><div style="position:absolute;top:0;left:0;bottom:0;width:${t.p}%;background:${col};border-radius:2px;box-shadow:0 0 4px ${col}55"></div></div>`;
        }
        h+=`<td class="gc${we?' wk':''}">${cell}</td>`;
      });
      h+='</tr>';
    });
    // Add task button row per phase
    h+=`<tr class="tr-add"><td colspan="${COLS+days.length}"><button class="add-task-row-btn" onclick="openAddTask('${ph.id}')">+ Agregar tarea en ${ph.name}</button></td></tr>`;
  });

  // Add phase button row
  h+=`<tr class="tr-add-ph"><td colspan="${COLS+days.length}"><button class="add-ph-row-btn" onclick="openAddPhase()">+ Agregar fase</button></td></tr>`;

  h+='</tbody></table></div>';
  h+=`<div class="legend">
    <span class="li"><span class="lbox" style="background:#3ecf8e;box-shadow:0 0 4px rgba(62,207,142,0.4)"></span>Completado</span>
    <span class="li"><span class="lbox" style="background:#4f8ef7;box-shadow:0 0 4px rgba(79,142,247,0.4)"></span>En progreso</span>
    <span class="li"><span class="lbox" style="background:#1e2a40;border:1px solid #2a3a5a"></span>Pendiente</span>
    <span class="li"><span style="width:9px;height:9px;background:#f59e0b;transform:rotate(45deg);display:inline-block;border-radius:1px;box-shadow:0 0 6px rgba(245,158,11,0.5)"></span>&nbsp;Hito</span>
    <span class="li"><span class="lbox" style="background:rgba(255,255,255,0.03);border:1px solid #1e1e30"></span>Fin de semana</span>
  </div>`;
  return h;
}

/* ── RENDER MONTHS ── */
function renderMonths(){
  const COLS=5;
  const multiYear=new Set(MONTHS.map(m=>m.y)).size>1;
  let h='<div class="go"><table style="table-layout:fixed"><thead><tr>';
  h+=`<th class="lft" style="width:150px">Tarea</th><th class="lft" style="width:90px">Responsable</th><th style="width:36px">Días</th><th style="width:68px">Avance</th><th style="width:80px"></th>`;
  MONTHS.forEach(mo=>h+=`<th style="width:75px;font-size:11px;font-weight:600">${mname(mo.m)}${multiYear?' '+mo.y:''}</th>`);
  h+='</tr></thead><tbody>';

  PHASES.forEach(ph=>{
    const phtasks=TASKS.filter(t=>t.ph===ph.id);
    h+=`<tr class="ph"><td colspan="${COLS+MONTHS.length}"><span>${ph.name}</span><span class="ph-actions"><button class="ph-del-btn" onclick="deletePhase('${ph.id}')">✕ Eliminar fase</button></span></td></tr>`;
    phtasks.forEach(t=>{
      const ts=pd(t.s),te=pd(t.e),col=phColor(t.ph);
      const pb=t.p===null?'':`<div class="pb"><div class="pf" style="width:${t.p}%;background:${col}"></div></div><div class="pl">${t.p}%</div>`;
      const actions=t.ms?'':`<button class="ed-btn" onclick="openEdit(${t.id})">Editar</button> <button class="del-btn" onclick="deleteTask(${t.id})">✕</button>`;
      h+=`<tr class="tr"><td><div class="tn${t.ms?' ms':''}" style="overflow:hidden;text-overflow:ellipsis">${t.ms?'◆ ':''} ${t.n}</div></td><td><div class="rp">${t.r}</div></td><td class="dc">${t.d||'—'}</td><td class="pw">${pb}</td><td style="white-space:nowrap">${actions}</td>`;
      MONTHS.forEach(mo=>{
        const ms_=new Date(mo.y,mo.m,1),me_=new Date(mo.y,mo.m+1,0);
        if(t.ms){
          const ok=ts>=ms_&&ts<=me_;
          h+=`<td style="text-align:center;vertical-align:middle">${ok?'<span style="display:inline-block;width:9px;height:9px;background:#f59e0b;transform:rotate(45deg);border-radius:1px;box-shadow:0 0 6px rgba(245,158,11,0.5)"></span>':''}</td>`;
        } else {
          const bs=Math.max(ts.getTime(),ms_.getTime()),be=Math.min(te.getTime(),me_.getTime());
          if(be<bs){h+='<td></td>';return}
          const tot=me_.getTime()-ms_.getTime();
          const lft=((bs-ms_.getTime())/tot*100).toFixed(1);
          const wid=Math.max(((be-bs)/tot*100),4).toFixed(1);
          const bc=t.p===100?'#3ecf8e':t.p===0?'#1e2a40':col;
          const glow=t.p===100?'0 0 5px rgba(62,207,142,0.3)':t.p>0?`0 0 5px ${col}55`:'none';
          h+=`<td style="position:relative;height:28px;padding:0 3px"><div style="position:absolute;top:8px;height:11px;left:calc(3px + ${lft}%);width:calc(${wid}% - 3px);background:${bc};border-radius:2px;box-shadow:${glow}"></div></td>`;
        }
      });
      h+='</tr>';
    });
    h+=`<tr class="tr-add"><td colspan="${COLS+MONTHS.length}"><button class="add-task-row-btn" onclick="openAddTask('${ph.id}')">+ Agregar tarea en ${ph.name}</button></td></tr>`;
  });

  h+=`<tr class="tr-add-ph"><td colspan="${COLS+MONTHS.length}"><button class="add-ph-row-btn" onclick="openAddPhase()">+ Agregar fase</button></td></tr>`;

  h+='</tbody></table></div>';
  h+=`<div class="legend">
    <span class="li"><span class="lbox" style="background:#3ecf8e;box-shadow:0 0 4px rgba(62,207,142,0.4)"></span>Completado</span>
    <span class="li"><span class="lbox" style="background:#4f8ef7;box-shadow:0 0 4px rgba(79,142,247,0.4)"></span>En progreso</span>
    <span class="li"><span class="lbox" style="background:#1e2a40;border:1px solid #2a3a5a"></span>Pendiente</span>
    <span class="li"><span style="width:9px;height:9px;background:#f59e0b;transform:rotate(45deg);display:inline-block;border-radius:1px;box-shadow:0 0 6px rgba(245,158,11,0.5)"></span>&nbsp;Hito</span>
  </div>`;
  return h;
}

/* ── PDF EXPORT ── */
function hexToRgb(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return[r,g,b]}

async function exportPDF(){
  const btn=document.getElementById('pdfbtn');
  btn.classList.add('loading');btn.textContent='Generando...';
  await new Promise(r=>setTimeout(r,50));
  try{
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
    const PW=297,PH=210,M=12;
    const IW=PW-2*M;

    const phColors={'p1':'#185FA5','p2':'#0F6E56','p3':'#854F0B','p4':'#5B3FA5','p5':'#993556'};

    function hexFill(doc,hex){const[r,g,b]=hexToRgb(hex);doc.setFillColor(r,g,b)}
    function hexText(doc,hex){const[r,g,b]=hexToRgb(hex);doc.setTextColor(r,g,b)}

    function pageHeader(doc,pg,title){
      doc.setFillColor(245,245,245);doc.rect(0,0,PW,12,'F');
      doc.setFontSize(8);doc.setFont('helvetica','bold');hexText(doc,'#111111');
      doc.text('CRONOGRAMA DE OBRA – DIAGRAMA DE GANTT',M,8);
      doc.setFont('helvetica','normal');hexText(doc,'#666666');
      doc.text(dateRangeLabel(),M+80,8);
      doc.text(title,PW-M,8,{align:'right'});
      doc.text('Pag. '+pg,PW-M,5,{align:'right'});
      doc.setDrawColor(200,200,200);doc.line(M,12,PW-M,12);
    }

    function drawStatCards(doc,y){
      const rt=TASKS.filter(t=>!t.ms);
      const done=rt.filter(t=>t.p===100).length;
      const inp=rt.filter(t=>t.p>0&&t.p<100).length;
      const avg=rt.length?Math.round(rt.reduce((a,t)=>a+(t.p||0),0)/rt.length):0;
      const pend=PENDING.filter(p=>!p.done).length;
      const cards=[
        {label:'Avance general',val:avg+'%',sub:'del proyecto'},
        {label:'Completadas',val:done+'/'+rt.length,sub:'tareas'},
        {label:'En progreso',val:''+inp,sub:'tareas activas'},
        {label:'Pendientes',val:''+pend,sub:'de '+PENDING.length+' items'},
      ];
      const cw=IW/4-3;
      cards.forEach((c,i)=>{
        const cx=M+i*(cw+4);
        doc.setFillColor(247,247,247);doc.roundedRect(cx,y,cw,14,1.5,1.5,'F');
        doc.setFontSize(6);doc.setFont('helvetica','normal');hexText(doc,'#888888');
        doc.text(c.label.toUpperCase(),cx+4,y+4.5);
        doc.setFontSize(11);doc.setFont('helvetica','bold');hexText(doc,'#111111');
        doc.text(c.val,cx+4,y+10.5);
        doc.setFontSize(6);doc.setFont('helvetica','normal');hexText(doc,'#aaaaaa');
        doc.text(c.sub,cx+4,y+13.5);
      });
    }

    function drawGanttMonths(doc,startY){
      const mnames=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
      const leftCols=150;
      const timelineW=IW-leftCols;
      const colW=timelineW/MONTHS.length;
      const rowH=6.5;
      let y=startY;

      doc.setFillColor(240,240,240);doc.rect(M,y,IW,7,'F');
      doc.setFontSize(6.5);doc.setFont('helvetica','bold');hexText(doc,'#444444');
      const headers=['Tarea','Responsable','Días','Avance'];
      const hw=[70,32,15,28];
      let hx=M+2;
      headers.forEach((h,i)=>{doc.text(h,hx,y+4.5);hx+=hw[i]});
      MONTHS.forEach((mo,i)=>{
        const mx=M+leftCols+i*colW+colW/2;
        doc.text(mnames[mo.m],mx,y+4.5,{align:'center'});
      });
      y+=7;
      doc.setDrawColor(200,200,200);doc.line(M,y,M+IW,y);

      PHASES.forEach(ph=>{
        const phtasks=TASKS.filter(t=>t.ph===ph.id);
        if(!phtasks.length)return;
        doc.setFillColor(248,248,248);doc.rect(M,y,IW,5,'F');
        doc.setFontSize(6);doc.setFont('helvetica','bold');hexText(doc,'#666666');
        doc.text(ph.name.toUpperCase(),M+2,y+3.5);
        y+=5;
        doc.setDrawColor(220,220,220);doc.line(M,y,M+IW,y);

        phtasks.forEach(t=>{
          const ts=pd(t.s),te=pd(t.e);
          const pcol=phColors[t.ph]||ph.col||'#185FA5';
          doc.setFontSize(6);doc.setFont('helvetica','normal');hexText(doc,'#222222');
          const label=t.ms?('◆ '+t.n):t.n;
          doc.text(label,M+2,y+rowH/2+1.5,{maxWidth:67});
          hexText(doc,'#777777');doc.text(t.r,M+hw[0]+2,y+rowH/2+1.5);
          doc.text(t.d?String(t.d):'—',M+hw[0]+hw[1]+hw[2]/2,y+rowH/2+1.5,{align:'center'});
          if(t.p!==null){
            const bx=M+hw[0]+hw[1]+15+2,bw=24,bh=2.5,by=y+rowH/2-0.5;
            doc.setFillColor(220,220,220);doc.roundedRect(bx,by,bw,bh,0.5,0.5,'F');
            if(t.p>0){const[r,g,b]=hexToRgb(pcol);doc.setFillColor(r,g,b);doc.roundedRect(bx,by,bw*t.p/100,bh,0.5,0.5,'F')}
            doc.setFontSize(5);hexText(doc,'#666666');
            doc.text(t.p+'%',bx+bw+1,by+2);
          }
          MONTHS.forEach((mo,i)=>{
            const ms_=new Date(mo.y,mo.m,1),me_=new Date(mo.y,mo.m+1,0);
            if(t.ms){
              const ok=ts>=ms_&&ts<=me_;
              if(ok){
                const mx=M+leftCols+i*colW+colW/2;
                doc.setFillColor(186,117,23);
                doc.rect(mx-1.5,y+rowH/2-1.5,3,3,'F');
              }
            } else {
              const bs=Math.max(ts.getTime(),ms_.getTime()),be=Math.min(te.getTime(),me_.getTime());
              if(be>=bs){
                const tot=me_.getTime()-ms_.getTime();
                const lft=(bs-ms_.getTime())/tot,wf=(be-bs)/tot;
                const bx=M+leftCols+i*colW+lft*colW+1;
                const bw=Math.max(wf*colW-2,1.5);
                const barCol=t.p===100?'#0F6E56':t.p===0?'#B5D4F4':pcol;
                const[r,g,b]=hexToRgb(barCol);doc.setFillColor(r,g,b);
                doc.roundedRect(bx,y+rowH/2-1.8,bw,3.5,0.5,0.5,'F');
              }
            }
          });
          doc.setDrawColor(235,235,235);doc.line(M,y+rowH,M+IW,y+rowH);
          y+=rowH;
          if(y>PH-20){
            doc.addPage();
            pageHeader(doc,doc.internal.getNumberOfPages(),'Gantt de obra – cont.');
            y=18;
          }
        });
      });

      y+=3;
      const legend=[{col:'#0F6E56',label:'Completado'},{col:'#185FA5',label:'En progreso'},{col:'#B5D4F4',label:'Pendiente'},{col:'#BA7517',label:'Hito'}];
      let lx=M;
      legend.forEach(l=>{
        const[r,g,b]=hexToRgb(l.col);doc.setFillColor(r,g,b);doc.roundedRect(lx,y,5,3,0.5,0.5,'F');
        doc.setFontSize(5.5);doc.setFont('helvetica','normal');hexText(doc,'#666666');
        doc.text(l.label,lx+6.5,y+2.5);
        lx+=28;
      });
      return y+8;
    }

    function drawPendingPage(doc){
      doc.addPage();
      pageHeader(doc,doc.internal.getNumberOfPages(),'Tareas pendientes');
      let y=18;
      doc.setFontSize(9);doc.setFont('helvetica','bold');hexText(doc,'#111111');
      doc.text('Tareas pendientes de proyectos',M,y);y+=7;
      doc.setDrawColor(200,200,200);doc.line(M,y,PW-M,y);y+=4;

      const open_=PENDING.filter(p=>!p.done);
      const done_=PENDING.filter(p=>p.done);
      const all=[...open_,...done_];

      const badgeW=42,descW=IW-badgeW-20,rowH2=8;
      all.forEach(p=>{
        if(y>PH-18){doc.addPage();pageHeader(doc,doc.internal.getNumberOfPages(),'Tareas pendientes – cont.');y=18}
        const statCol=p.done?'#3B6D11':'#185FA5';
        const statBg=p.done?'#EAF3DE':'#E6F1FB';
        const statLabel=p.done?'Listo':'Pendiente';
        const[sr,sg,sb]=hexToRgb(statBg);
        doc.setFillColor(sr,sg,sb);doc.roundedRect(M,y,badgeW,6,1,1,'F');
        doc.setFontSize(5.5);doc.setFont('helvetica','bold');hexText(doc,statCol);
        doc.text(p.proj,M+badgeW/2,y+4,{align:'center',maxWidth:badgeW-2});
        doc.setFont('helvetica','normal');
        hexText(doc,p.done?'#aaaaaa':'#333333');doc.setFontSize(6);
        doc.text(p.desc,M+badgeW+4,y+4,{maxWidth:descW});
        const[tr,tg,tb]=hexToRgb(statBg);
        doc.setFillColor(tr,tg,tb);doc.roundedRect(PW-M-18,y+1,17,4.5,1,1,'F');
        doc.setFontSize(5);hexText(doc,statCol);
        doc.text(statLabel,PW-M-9,y+4,{align:'center'});
        doc.setDrawColor(235,235,235);doc.line(M,y+rowH2,PW-M,y+rowH2);
        y+=rowH2;
      });
    }

    pageHeader(doc,1,'Gantt de obra');
    drawStatCards(doc,14);
    drawGanttMonths(doc,33);
    drawPendingPage(doc);
    doc.save('cronograma_obra.pdf');
  } catch(err){console.error(err);alert('Error al generar el PDF: '+err.message)}
  finally{
    btn.classList.remove('loading');
    btn.innerHTML='<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v8M4 6l3 3 3-3M2 11h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg> Descargar PDF';
  }
}

function ghHeaders(){
  return {

  };

/* ── PUSH (HTML → GitHub) ── */
async function pushToGitHub(){
  const payload = { phases: PHASES, tasks: TASKS, pending: PENDING };
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(payload, null, 2))));

  // Get current SHA (needed to update existing file)
  let sha = null;
  try {
    const r = await fetch(GH_API, { headers: ghHeaders() });
    if(r.ok){ const d = await r.json(); sha = d.sha; }
  } catch(e){}

  const body = { message: 'sync: actualizar datos cronograma', content };
  if(sha) body.sha = sha;

  const res = await fetch(GH_API, {
    method: 'PUT',
    headers: ghHeaders(),
    body: JSON.stringify(body)
  });
  if(!res.ok){
    const err = await res.json();
    throw new Error(err.message || res.status);
  }
  const now = new Date().toLocaleString('es-AR');
  localStorage.setItem(LS_LAST_KEY, now);
  updateGHBtnState(true);
}

/* ── PULL (GitHub → HTML) ── */
async function pullFromGitHub(){
  const res = await fetch(GH_API, { headers: ghHeaders() });
  if(!res.ok) throw new Error(`HTTP ${res.status}`);
  const meta = await res.json();
  const json = JSON.parse(decodeURIComponent(escape(atob(meta.content))));

  if(json.phases  && json.phases.length)  PHASES  = json.phases;
  if(json.tasks   && json.tasks.length)   TASKS   = json.tasks;
  if(json.pending && json.pending.length) PENDING = json.pending;

  const maxT  = TASKS.reduce((m,t)=>Math.max(m,t.id||0),-1);
  const maxP  = PENDING.reduce((m,p)=>Math.max(m,p.id||0),-1);
  const maxPh = PHASES.reduce((m,p)=>{const n=parseInt((p.id||'').replace('p',''));return Math.max(m,n);},0);
  nextTaskId    = maxT+1;
  nextPendingId = maxP+1;
  nextPhaseId   = maxPh+1;

  const now = new Date().toLocaleString('es-AR');
  localStorage.setItem(LS_LAST_KEY, now);
  updateGHBtnState(true);
  renderAll();
}

/* ── CONFIG MODAL ── */
function openSheetsConfig(){
  if(document.getElementById('cfgoverlay')) return;
  const last    = localStorage.getItem(LS_LAST_KEY);
  const lastTxt = last ? `Última sincronización: ${last}` : 'Nunca sincronizado.';

  const el = document.createElement('div');
  el.className = 'cfg-overlay'; el.id = 'cfgoverlay';
  el.innerHTML = `
  <div class="cfg-modal">
    <h3>🐙 Sincronizar con GitHub</h3>
    <p class="sub">Los datos se guardan en <strong style="color:var(--accent-blue)">${GH_OWNER}/${GH_REPO}/${GH_FILE}</strong>. Se cargan al abrir la página y se guardan automáticamente al editar.</p>
    <div class="sync-status inf" id="cfg_status">${lastTxt}</div>
    <div class="mbrow" style="margin-top:.75rem;padding-top:.75rem;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end">
      <button onclick="closeCfg()">Cerrar</button>
      <button onclick="manualPull()" style="border:1px solid var(--border);background:var(--bg-surface);color:var(--text-primary);font-size:12px;padding:7px 14px;border-radius:7px;cursor:pointer;font-family:var(--font)">⬇ Cargar desde GitHub</button>
      <button onclick="manualPush()" style="background:var(--accent-green);border-color:var(--accent-green);color:#fff;font-size:12px;font-weight:600;padding:7px 16px;border-radius:7px;cursor:pointer;font-family:var(--font);border:none;box-shadow:0 0 12px var(--glow-green)">⬆ Guardar en GitHub</button>
    </div>
  </div>`;
  el.addEventListener('click', e=>{ if(e.target===el) closeCfg(); });
  document.body.appendChild(el);
}

function closeCfg(){
  const el=document.getElementById('cfgoverlay');
  if(el) el.remove();
}

function cfgStatus(msg, type='inf'){
  const el=document.getElementById('cfg_status');
  if(!el) return;
  el.textContent=msg;
  el.className='sync-status '+type;
}

async function manualPull(){
  cfgStatus('Cargando desde GitHub...','inf');
  try {
    await pullFromGitHub();
    cfgStatus('✓ Datos cargados correctamente.','ok');
  } catch(e){
    cfgStatus('Error al cargar: '+e.message,'err');
  }
}

async function manualPush(){
  cfgStatus('Guardando en GitHub...','inf');
  try {
    await pushToGitHub();
    cfgStatus('✓ Guardado en GitHub correctamente.','ok');
  } catch(e){
    cfgStatus('Error al guardar: '+e.message,'err');
  }
}

/* ── AUTO-SYNC: push after every mutation ── */
async function autoSync(){
  try { await pushToGitHub(); } catch(e){ /* silencioso */ }
}

/* ── PATCH CRUD functions to auto-sync ── */
const _origSaveEdit        = saveEdit;
const _origSaveAddTask     = saveAddTask;
const _origDeleteTask      = deleteTask;
const _origSaveAddPhase    = saveAddPhase;
const _origDeletePhase     = deletePhase;
const _origSaveAddPending  = saveAddPending;
const _origDeletePending   = deletePending;
const _origTogglePending   = togglePending;

saveEdit = function(){          _origSaveEdit();        autoSync(); };
saveAddTask = function(){       _origSaveAddTask();     autoSync(); };
deleteTask = function(id){      _origDeleteTask(id);    autoSync(); };
saveAddPhase = function(){      _origSaveAddPhase();    autoSync(); };
deletePhase = function(id){     _origDeletePhase(id);   autoSync(); };
saveAddPending = function(){    _origSaveAddPending();  autoSync(); };
deletePending = function(id,e){ _origDeletePending(id,e); autoSync(); };
togglePending = function(id){   _origTogglePending(id); autoSync(); };

/* ── AUTO-LOAD on page open ── */
(async function autoLoad(){
  try {
    await pullFromGitHub();
  } catch(e){ /* sin conexión o repo vacío: usa datos locales */ }
})();

updateDateRange();
renderAll();
</script>
